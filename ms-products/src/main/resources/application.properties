spring.application.name=ms-products
server.port=${SERVER_PORT:8082}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5434/pulpapp_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:1234}
spring.datasource.driver-class-name=org.postgresql.Driver

# Liquibase gestiona el esquema; Hibernate no debe modificar tablas
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Liquibase: apunta al changelog maestro del microservicio
spring.liquibase.change-log=classpath:db/changelog/changelog-master.yml
spring.liquibase.enabled=true

# Upload de imágenes de productos
app.upload.dir=${APP_UPLOAD_DIR:uploads/products}
app.base-url=${APP_BASE_URL:http://localhost:8082}

# Tamaño máximo de archivo (10 MB)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# JWT: misma clave que ms-users para decodificar tenantId del token
jwt.secret=${JWT_SECRET:cGVwcGVyTWludFB1bHBBcHBTZWNyZXRLZXkyMDI2IVhZWg==}

# Tenant por defecto: ID del tenant "PulpApp" creado por ms-users.
# Se usa para asignar productos/categorías cuando no hay JWT en el request.
tenant.default-id=${TENANT_DEFAULT_ID:1}
