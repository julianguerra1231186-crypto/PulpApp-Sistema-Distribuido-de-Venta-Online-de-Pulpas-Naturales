databaseChangeLog:

  # ============================================================
  # changeSet 1: Tabla category
  # Entidad padre que clasifica los productos.
  # Relación: Category (1) -> Product (N)
  # onFail: MARK_RAN — si la tabla ya existe, se registra sin error.
  # ============================================================
  - changeSet:
      id: 1-create-category-table
      author: pulpapp-team
      comment: Crea la tabla category. Entidad padre de products relacion 1-N.
      preConditions:
        onFail: MARK_RAN
        not:
          tableExists:
            tableName: category
      changes:
        - createTable:
            tableName: category
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: description
                  type: VARCHAR(255)
                  constraints:
                    nullable: true

  # ============================================================
  # changeSet 2: Tabla products
  # Catálogo de pulpas. Columnas en snake_case para coincidir
  # con la convención de nombres que usa Hibernate (imageUrl -> image_url).
  # onFail: MARK_RAN — si la tabla ya existe, se registra sin error.
  # ============================================================
  - changeSet:
      id: 2-create-products-table
      author: pulpapp-team
      comment: Crea la tabla products con todos sus campos base.
      preConditions:
        onFail: MARK_RAN
        not:
          tableExists:
            tableName: products
      changes:
        - createTable:
            tableName: products
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(120)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: description
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: price
                  type: DOUBLE PRECISION
                  constraints:
                    nullable: false
              - column:
                  name: stock
                  type: INTEGER
                  constraints:
                    nullable: false
              - column:
                  name: available
                  type: BOOLEAN
                  constraints:
                    nullable: false
              # Hibernate convierte imageUrl -> image_url (snake_case)
              - column:
                  name: image_url
                  type: VARCHAR(255)
                  constraints:
                    nullable: true

  # ============================================================
  # changeSet 3: FK products -> category
  # Agrega category_id a products y crea la FK.
  # onDelete SET NULL: borrar categoría no borra productos.
  # onFail: MARK_RAN — si la columna ya existe, se registra sin error.
  # ============================================================
  - changeSet:
      id: 3-add-category-fk-to-products
      author: pulpapp-team
      comment: Agrega category_id a products y crea FK hacia category.
      preConditions:
        onFail: MARK_RAN
        not:
          columnExists:
            tableName: products
            columnName: category_id
      changes:
        - addColumn:
            tableName: products
            columns:
              - column:
                  name: category_id
                  type: BIGINT
                  constraints:
                    nullable: true
        - addForeignKeyConstraint:
            baseTableName: products
            baseColumnNames: category_id
            constraintName: fk_products_category
            referencedTableName: category
            referencedColumnNames: id
            onDelete: SET NULL

  # ============================================================
  # changeSet 4: Datos semilla — categorías iniciales
  # Inserta las 4 categorías base si la tabla está vacía.
  # onFail: MARK_RAN — si ya hay datos, se registra sin error.
  # ============================================================
  - changeSet:
      id: 4-seed-categories
      author: pulpapp-team
      comment: Inserta categorias iniciales de pulpas de fruta.
      preConditions:
        onFail: MARK_RAN
        sqlCheck:
          expectedResult: "0"
          sql: SELECT COUNT(*) FROM category
      changes:
        - insert:
            tableName: category
            columns:
              - column:
                  name: name
                  value: Tropicales
              - column:
                  name: description
                  value: Pulpas de frutas tropicales como mango maracuya y lulo
        - insert:
            tableName: category
            columns:
              - column:
                  name: name
                  value: Citricas
              - column:
                  name: description
                  value: Pulpas de frutas citricas como naranja y limon
        - insert:
            tableName: category
            columns:
              - column:
                  name: name
                  value: Berries
              - column:
                  name: description
                  value: Pulpas de frutos rojos como fresa y mora
        - insert:
            tableName: category
            columns:
              - column:
                  name: name
                  value: Exoticas
              - column:
                  name: description
                  value: Pulpas de frutas exoticas y poco comunes

  # ============================================================
  # changeSet 5: Ampliar image_url a TEXT para soportar base64
  # ============================================================
  - changeSet:
      id: 5-alter-image-url-to-text
      author: pulpapp-team
      comment: Cambia image_url de VARCHAR(255) a TEXT para soportar imagenes en base64.
      preConditions:
        onFail: MARK_RAN
      changes:
        - modifyDataType:
            tableName: products
            columnName: image_url
            newDataType: TEXT

  # ============================================================
  # FASE 2 MULTI-TENANT
  # ============================================================

  # ============================================================
  # changeSet 6: Columna tenant_id en products
  # Asocia cada producto a un tenant. Nullable inicialmente
  # para no romper registros existentes.
  # onFail: MARK_RAN — idempotente.
  # ============================================================
  - changeSet:
      id: 6-add-tenant-id-to-products
      author: pulpapp-team
      comment: "Fase 2 Multi-Tenant: agrega columna tenant_id a products."
      preConditions:
        onFail: MARK_RAN
        not:
          columnExists:
            tableName: products
            columnName: tenant_id
      changes:
        - addColumn:
            tableName: products
            columns:
              - column:
                  name: tenant_id
                  type: BIGINT
                  constraints:
                    nullable: true

  # ============================================================
  # changeSet 7: Columna tenant_id en category
  # Asocia cada categoría a un tenant.
  # onFail: MARK_RAN — idempotente.
  # ============================================================
  - changeSet:
      id: 7-add-tenant-id-to-category
      author: pulpapp-team
      comment: "Fase 2 Multi-Tenant: agrega columna tenant_id a category."
      preConditions:
        onFail: MARK_RAN
        not:
          columnExists:
            tableName: category
            columnName: tenant_id
      changes:
        - addColumn:
            tableName: category
            columns:
              - column:
                  name: tenant_id
                  type: BIGINT
                  constraints:
                    nullable: true

  # ============================================================
  # changeSet 8: Migrar productos existentes al tenant por defecto
  # Asigna tenant_id = (id del tenant PulpApp) a todos los productos
  # que aún no tienen tenant asignado.
  # NOTA: La tabla tenants es creada por ms-users (Liquibase Fase 1).
  # Ambos microservicios comparten la misma BD (pulpapp_db).
  # onFail: MARK_RAN — idempotente.
  # ============================================================
  - changeSet:
      id: 8-migrate-products-to-default-tenant
      author: pulpapp-team
      comment: "Fase 2 Multi-Tenant: asigna el tenant por defecto a productos existentes."
      preConditions:
        onFail: MARK_RAN
        sqlCheck:
          expectedResult: "1"
          sql: SELECT CASE WHEN COUNT(*) > 0 THEN 1 ELSE 0 END FROM products WHERE tenant_id IS NULL
      changes:
        - sql:
            sql: >
              UPDATE products
              SET tenant_id = (SELECT id FROM tenants WHERE name = 'PulpApp' LIMIT 1)
              WHERE tenant_id IS NULL

  # ============================================================
  # changeSet 9: Migrar categorías existentes al tenant por defecto
  # onFail: MARK_RAN — idempotente.
  # ============================================================
  - changeSet:
      id: 9-migrate-categories-to-default-tenant
      author: pulpapp-team
      comment: "Fase 2 Multi-Tenant: asigna el tenant por defecto a categorias existentes."
      preConditions:
        onFail: MARK_RAN
        sqlCheck:
          expectedResult: "1"
          sql: SELECT CASE WHEN COUNT(*) > 0 THEN 1 ELSE 0 END FROM category WHERE tenant_id IS NULL
      changes:
        - sql:
            sql: >
              UPDATE category
              SET tenant_id = (SELECT id FROM tenants WHERE name = 'PulpApp' LIMIT 1)
              WHERE tenant_id IS NULL

  # ============================================================
  # changeSet 10: Índice en products.tenant_id
  # Optimiza consultas filtradas por tenant.
  # onFail: MARK_RAN — idempotente.
  # ============================================================
  - changeSet:
      id: 10-index-products-tenant-id
      author: pulpapp-team
      comment: "Fase 2 Multi-Tenant: crea indice en products.tenant_id."
      preConditions:
        onFail: MARK_RAN
        not:
          indexExists:
            indexName: idx_products_tenant_id
      changes:
        - createIndex:
            tableName: products
            indexName: idx_products_tenant_id
            columns:
              - column:
                  name: tenant_id

  # ============================================================
  # changeSet 11: Índice en category.tenant_id
  # onFail: MARK_RAN — idempotente.
  # ============================================================
  - changeSet:
      id: 11-index-category-tenant-id
      author: pulpapp-team
      comment: "Fase 2 Multi-Tenant: crea indice en category.tenant_id."
      preConditions:
        onFail: MARK_RAN
        not:
          indexExists:
            indexName: idx_category_tenant_id
      changes:
        - createIndex:
            tableName: category
            indexName: idx_category_tenant_id
            columns:
              - column:
                  name: tenant_id
