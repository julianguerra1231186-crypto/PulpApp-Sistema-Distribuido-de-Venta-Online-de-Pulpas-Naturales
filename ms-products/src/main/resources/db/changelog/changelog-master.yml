databaseChangeLog:

  # ============================================================
  # changeSet 1: Tabla category
  # Entidad padre que clasifica los productos.
  # Relación: Category (1) -> Product (N)
  # onFail: MARK_RAN — si la tabla ya existe, se registra sin error.
  # ============================================================
  - changeSet:
      id: 1-create-category-table
      author: pulpapp-team
      comment: Crea la tabla category. Entidad padre de products relacion 1-N.
      preConditions:
        onFail: MARK_RAN
        not:
          tableExists:
            tableName: category
      changes:
        - createTable:
            tableName: category
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: description
                  type: VARCHAR(255)
                  constraints:
                    nullable: true

  # ============================================================
  # changeSet 2: Tabla products
  # Catálogo de pulpas. Columnas en snake_case para coincidir
  # con la convención de nombres que usa Hibernate (imageUrl -> image_url).
  # onFail: MARK_RAN — si la tabla ya existe, se registra sin error.
  # ============================================================
  - changeSet:
      id: 2-create-products-table
      author: pulpapp-team
      comment: Crea la tabla products con todos sus campos base.
      preConditions:
        onFail: MARK_RAN
        not:
          tableExists:
            tableName: products
      changes:
        - createTable:
            tableName: products
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(120)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: description
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: price
                  type: DOUBLE PRECISION
                  constraints:
                    nullable: false
              - column:
                  name: stock
                  type: INTEGER
                  constraints:
                    nullable: false
              - column:
                  name: available
                  type: BOOLEAN
                  constraints:
                    nullable: false
              # Hibernate convierte imageUrl -> image_url (snake_case)
              - column:
                  name: image_url
                  type: VARCHAR(255)
                  constraints:
                    nullable: true

  # ============================================================
  # changeSet 3: FK products -> category
  # Agrega category_id a products y crea la FK.
  # onDelete SET NULL: borrar categoría no borra productos.
  # onFail: MARK_RAN — si la columna ya existe, se registra sin error.
  # ============================================================
  - changeSet:
      id: 3-add-category-fk-to-products
      author: pulpapp-team
      comment: Agrega category_id a products y crea FK hacia category.
      preConditions:
        onFail: MARK_RAN
        not:
          columnExists:
            tableName: products
            columnName: category_id
      changes:
        - addColumn:
            tableName: products
            columns:
              - column:
                  name: category_id
                  type: BIGINT
                  constraints:
                    nullable: true
        - addForeignKeyConstraint:
            baseTableName: products
            baseColumnNames: category_id
            constraintName: fk_products_category
            referencedTableName: category
            referencedColumnNames: id
            onDelete: SET NULL

  # ============================================================
  # changeSet 4: Datos semilla — categorías iniciales
  # Inserta las 4 categorías base si la tabla está vacía.
  # onFail: MARK_RAN — si ya hay datos, se registra sin error.
  # ============================================================
  - changeSet:
      id: 4-seed-categories
      author: pulpapp-team
      comment: Inserta categorias iniciales de pulpas de fruta.
      preConditions:
        onFail: MARK_RAN
        sqlCheck:
          expectedResult: "0"
          sql: SELECT COUNT(*) FROM category
      changes:
        - insert:
            tableName: category
            columns:
              - column:
                  name: name
                  value: Tropicales
              - column:
                  name: description
                  value: Pulpas de frutas tropicales como mango maracuya y lulo
        - insert:
            tableName: category
            columns:
              - column:
                  name: name
                  value: Citricas
              - column:
                  name: description
                  value: Pulpas de frutas citricas como naranja y limon
        - insert:
            tableName: category
            columns:
              - column:
                  name: name
                  value: Berries
              - column:
                  name: description
                  value: Pulpas de frutos rojos como fresa y mora
        - insert:
            tableName: category
            columns:
              - column:
                  name: name
                  value: Exoticas
              - column:
                  name: description
                  value: Pulpas de frutas exoticas y poco comunes
