# ============================================
# API GATEWAY - CONFIGURACIÓN PRINCIPAL
# ============================================
# Punto de entrada único para todos los microservicios
# (users, products, orders)
# Puerto interno del contenedor

server:
  port: 8080

spring:
  cloud:
    gateway:

      # ============================================
      # SOLUCIÓN A CORS DUPLICADO
      # ============================================
      # Evita headers duplicados como "* , *"
      # RemoveRequestHeader: NO se elimina Authorization
      # para que el JWT llegue intacto a cada microservicio.
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials

      # ============================================
      # CONFIGURACIÓN GLOBAL DE CORS
      # ============================================
      # Permite que el frontend (localhost:5500)
      # consuma el gateway sin bloqueos del navegador
      globalcors:
        cors-configurations:
          '[/**]':
            # ⚠ En producción usa:
            # "http://localhost:5500"
            allowedOrigins: "*"

            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS

            allowedHeaders: "*"

            # No usar cookies / sesiones
            allowCredentials: false

      # ============================================
      # RUTAS HACIA MICROSERVICIOS
      # ============================================
      routes:

        # --------------------------------------------
        # POSTULACIONES LABORALES — PÚBLICO POST / ADMIN GET
        # --------------------------------------------
        - id: ms-job-applications
          uri: ${GATEWAY_MS_USERS_URI:http://localhost:8081}
          predicates:
            - Path=/job-applications, /job-applications/**

        # --------------------------------------------
        # AUTENTICACIÓN (login / register) — PÚBLICO
        # Debe ir ANTES que ms-users para que el
        # predicado más específico tome precedencia.
        # --------------------------------------------
        - id: ms-auth
          uri: ${GATEWAY_MS_USERS_URI:http://localhost:8081}
          predicates:
            - Path=/auth, /auth/**

        # --------------------------------------------
        # GESTIÓN DE TENANTS — SOLO ADMIN (Fase 1 Multi-Tenant)
        # --------------------------------------------
        - id: ms-tenants
          uri: ${GATEWAY_MS_USERS_URI:http://localhost:8081}
          predicates:
            - Path=/tenants, /tenants/**

        # --------------------------------------------
        # PAGOS ONBOARDING SAAS (Fase 4)
        # --------------------------------------------
        - id: ms-payments
          uri: ${GATEWAY_MS_USERS_URI:http://localhost:8081}
          predicates:
            - Path=/payments, /payments/**

        # --------------------------------------------
        # ADMIN PAGOS ONBOARDING (Fase 4)
        # --------------------------------------------
        - id: ms-admin-payments
          uri: ${GATEWAY_MS_USERS_URI:http://localhost:8081}
          predicates:
            - Path=/admin/payments, /admin/payments/**

        # --------------------------------------------
        # CONFIGURACIÓN VISUAL POR TENANT (Fase 4)
        # --------------------------------------------
        - id: ms-tenant-config
          uri: ${GATEWAY_MS_USERS_URI:http://localhost:8081}
          predicates:
            - Path=/tenant/config, /tenant/config/**

        # --------------------------------------------
        # GESTIÓN DE USUARIOS POR TENANT (Fase 5 RBAC)
        # --------------------------------------------
        - id: ms-tenant-users
          uri: ${GATEWAY_MS_USERS_URI:http://localhost:8081}
          predicates:
            - Path=/tenant/users, /tenant/users/**

        # --------------------------------------------
        # CLIENTES DEL NEGOCIO (ERP Fase A)
        # --------------------------------------------
        - id: ms-clients
          uri: ${GATEWAY_MS_USERS_URI:http://localhost:8081}
          predicates:
            - Path=/clients, /clients/**

        # --------------------------------------------
        # MICROSERVICIO DE USUARIOS
        # --------------------------------------------
        - id: ms-users
          uri: ${GATEWAY_MS_USERS_URI:http://localhost:8081}
          predicates:
            - Path=/users, /users/**

        # --------------------------------------------
        # MICROSERVICIO DE PRODUCTOS (CATÁLOGO)
        # --------------------------------------------
        - id: ms-products
          uri: ${GATEWAY_MS_PRODUCTS_URI:http://localhost:8082}
          predicates:
            #  IMPORTANTE:
            # Incluye /products y /products/**
            - Path=/products, /products/**, /images/**

        # --------------------------------------------
        # CONFIGURACIÓN DINÁMICA Y NOTIFICACIONES ADMIN (Fase 2)
        # Rutas /admin/** y /notifications van a ms-users
        # --------------------------------------------
        - id: ms-admin-config
          uri: ${GATEWAY_MS_USERS_URI:http://localhost:8081}
          predicates:
            - Path=/admin/config, /admin/config/**

        - id: ms-notifications
          uri: ${GATEWAY_MS_USERS_URI:http://localhost:8081}
          predicates:
            - Path=/notifications, /notifications/**, /admin/notifications, /admin/notifications/**

        # --------------------------------------------
        # MICROSERVICIO DE PEDIDOS
        # --------------------------------------------
        - id: ms-orders
          uri: ${GATEWAY_MS_ORDERS_URI:http://localhost:8083}
          predicates:
            - Path=/orders, /orders/**