databaseChangeLog:

  # ============================================================
  # changeSet 1: Tabla users
  # Almacena los clientes registrados en PulpApp.
  # cedula y email son unicos. telefono es nullable por
  # compatibilidad con registros historicos.
  # onFail: MARK_RAN — si la tabla ya existe, se registra sin error.
  # ============================================================
  - changeSet:
      id: 1-create-users-table
      author: pulpapp-team
      comment: Crea la tabla users con cedula y email unicos.
      preConditions:
        onFail: MARK_RAN
        not:
          tableExists:
            tableName: users
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: cedula
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
                    unique: true
              # Nullable por compatibilidad con datos historicos
              - column:
                  name: telefono
                  type: VARCHAR(20)
                  constraints:
                    nullable: true
              - column:
                  name: name
                  type: VARCHAR(150)
                  constraints:
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(150)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: password
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: direccion
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

  # ============================================================
  # changeSet 2: Tabla pedidos
  # Pedidos internos gestionados desde ms-users.
  # Relacion: Pedido (N) -> User (1) mediante FK user_id.
  # onFail: MARK_RAN — si la tabla ya existe, se registra sin error.
  # ============================================================
  - changeSet:
      id: 2-create-pedidos-table
      author: pulpapp-team
      comment: Crea la tabla pedidos con FK hacia users. Relacion N-1.
      preConditions:
        onFail: MARK_RAN
        not:
          tableExists:
            tableName: pedidos
      changes:
        - createTable:
            tableName: pedidos
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: descripcion
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: total
                  type: DOUBLE PRECISION
                  constraints:
                    nullable: false
              # FK hacia users: cada pedido pertenece a un usuario
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false

  # ============================================================
  # changeSet 4: Columna role en users
  # Almacena el rol del usuario para RBAC (ROLE_ADMIN, ROLE_SELLER).
  # DEFAULT ROLE_SELLER para compatibilidad con registros historicos.
  # onFail: MARK_RAN — si la columna ya existe, se registra sin error.
  # ============================================================
  - changeSet:
      id: 4-add-role-to-users
      author: pulpapp-team
      comment: Agrega columna role a users con valor por defecto ROLE_SELLER.
      preConditions:
        onFail: MARK_RAN
        not:
          columnExists:
            tableName: users
            columnName: role
      changes:
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: role
                  type: VARCHAR(20)
                  defaultValue: ROLE_SELLER
                  constraints:
                    nullable: false

  # ============================================================
  # changeSet 3: FK pedidos -> users
  # RESTRICT: no se puede eliminar un usuario con pedidos.
  # onFail: MARK_RAN — si la FK ya existe, se registra sin error.
  # ============================================================
  - changeSet:
      id: 3-add-fk-pedidos-to-users
      author: pulpapp-team
      comment: Crea FK pedidos.user_id hacia users.id con RESTRICT.
      preConditions:
        onFail: MARK_RAN
        not:
          foreignKeyConstraintExists:
            foreignKeyName: fk_pedidos_user
      changes:
        - addForeignKeyConstraint:
            baseTableName: pedidos
            baseColumnNames: user_id
            constraintName: fk_pedidos_user
            referencedTableName: users
            referencedColumnNames: id
            onDelete: RESTRICT

  # ============================================================
  # changeSet 5: Tabla job_applications
  # Almacena postulaciones del formulario "Trabaja con nosotros".
  # cv_file guarda solo el nombre del archivo subido.
  # onFail: MARK_RAN — si la tabla ya existe, se registra sin error.
  # ============================================================
  - changeSet:
      id: 5-create-job-applications-table
      author: pulpapp-team
      comment: Crea la tabla job_applications para postulaciones laborales.
      preConditions:
        onFail: MARK_RAN
        not:
          tableExists:
            tableName: job_applications
      changes:
        - createTable:
            tableName: job_applications
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: full_name
                  type: VARCHAR(150)
                  constraints:
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(150)
                  constraints:
                    nullable: false
              - column:
                  name: phone
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: position
                  type: VARCHAR(150)
                  constraints:
                    nullable: true
              - column:
                  name: message
                  type: TEXT
                  constraints:
                    nullable: true
              - column:
                  name: cv_file
                  type: VARCHAR(255)
                  constraints:
                    nullable: true
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false

  # ============================================================
  # changeSet 6: Columna activo en users
  # Permite activar/desactivar vendedores sin eliminarlos.
  # DEFAULT true para compatibilidad con registros existentes.
  # onFail: MARK_RAN — si la columna ya existe, se registra sin error.
  # ============================================================
  - changeSet:
      id: 6-add-activo-to-users
      author: pulpapp-team
      comment: Agrega columna activo a users para gestionar estado del vendedor.
      preConditions:
        onFail: MARK_RAN
        not:
          columnExists:
            tableName: users
            columnName: activo
      changes:
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: activo
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false

  # ============================================================
  # changeSet 8: Tabla app_config
  # Almacena configuración dinámica del sistema (clave-valor).
  # Ejemplos: whatsapp_number, recruitment_enabled, delivery_mode.
  # onFail: MARK_RAN — idempotente.
  # ============================================================
  - changeSet:
      id: 8-create-app-config-table
      author: pulpapp-team
      comment: Crea la tabla app_config para configuración dinámica del sistema.
      preConditions:
        onFail: MARK_RAN
        not:
          tableExists:
            tableName: app_config
      changes:
        - createTable:
            tableName: app_config
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: config_key
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: config_value
                  type: TEXT
                  constraints:
                    nullable: true

  # ============================================================
  # changeSet 9: Tabla notifications
  # Almacena notificaciones creadas por el admin para mostrar
  # en el frontend (navbar/banner).
  # onFail: MARK_RAN — idempotente.
  # ============================================================
  - changeSet:
      id: 9-create-notifications-table
      author: pulpapp-team
      comment: Crea la tabla notifications para mensajes del administrador.
      preConditions:
        onFail: MARK_RAN
        not:
          tableExists:
            tableName: notifications
      changes:
        - createTable:
            tableName: notifications
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: title
                  type: VARCHAR(150)
                  constraints:
                    nullable: false
              - column:
                  name: message
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: active
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false

  # ============================================================
  # changeSet 7: Migrar usuarios ROLE_SELLER registrados públicamente
  # a ROLE_CLIENT. Los vendedores reales creados por el admin
  # conservan ROLE_SELLER. Solo se migran los que NO son ADMIN.
  # NOTA: Este changeset actualiza TODOS los ROLE_SELLER a ROLE_CLIENT.
  # Los vendedores deben ser re-asignados manualmente desde el panel.
  # onFail: MARK_RAN — idempotente.
  # ============================================================
  - changeSet:
      id: 7-migrate-seller-to-client
      author: pulpapp-team
      comment: Cambia ROLE_SELLER a ROLE_CLIENT para usuarios registrados públicamente.
      preConditions:
        onFail: MARK_RAN
        sqlCheck:
          expectedResult: "1"
          sql: SELECT CASE WHEN COUNT(*) > 0 THEN 1 ELSE 0 END FROM users WHERE role = 'ROLE_SELLER'
      changes:
        - sql:
            sql: UPDATE users SET role = 'ROLE_CLIENT' WHERE role = 'ROLE_SELLER'
