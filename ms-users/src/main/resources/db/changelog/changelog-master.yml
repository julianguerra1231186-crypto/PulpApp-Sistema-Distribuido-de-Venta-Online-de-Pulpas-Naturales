databaseChangeLog:

  # ============================================================
  # changeSet 1: Tabla users
  # Almacena los clientes registrados en PulpApp.
  # cedula y email son unicos. telefono es nullable por
  # compatibilidad con registros historicos.
  # onFail: MARK_RAN — si la tabla ya existe, se registra sin error.
  # ============================================================
  - changeSet:
      id: 1-create-users-table
      author: pulpapp-team
      comment: Crea la tabla users con cedula y email unicos.
      preConditions:
        onFail: MARK_RAN
        not:
          tableExists:
            tableName: users
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: cedula
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
                    unique: true
              # Nullable por compatibilidad con datos historicos
              - column:
                  name: telefono
                  type: VARCHAR(20)
                  constraints:
                    nullable: true
              - column:
                  name: name
                  type: VARCHAR(150)
                  constraints:
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(150)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: password
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: direccion
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

  # ============================================================
  # changeSet 2: Tabla pedidos
  # Pedidos internos gestionados desde ms-users.
  # Relacion: Pedido (N) -> User (1) mediante FK user_id.
  # onFail: MARK_RAN — si la tabla ya existe, se registra sin error.
  # ============================================================
  - changeSet:
      id: 2-create-pedidos-table
      author: pulpapp-team
      comment: Crea la tabla pedidos con FK hacia users. Relacion N-1.
      preConditions:
        onFail: MARK_RAN
        not:
          tableExists:
            tableName: pedidos
      changes:
        - createTable:
            tableName: pedidos
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: descripcion
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: total
                  type: DOUBLE PRECISION
                  constraints:
                    nullable: false
              # FK hacia users: cada pedido pertenece a un usuario
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false

  # ============================================================
  # changeSet 4: Columna role en users
  # Almacena el rol del usuario para RBAC (ROLE_ADMIN, ROLE_SELLER).
  # DEFAULT ROLE_SELLER para compatibilidad con registros historicos.
  # onFail: MARK_RAN — si la columna ya existe, se registra sin error.
  # ============================================================
  - changeSet:
      id: 4-add-role-to-users
      author: pulpapp-team
      comment: Agrega columna role a users con valor por defecto ROLE_SELLER.
      preConditions:
        onFail: MARK_RAN
        not:
          columnExists:
            tableName: users
            columnName: role
      changes:
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: role
                  type: VARCHAR(20)
                  defaultValue: ROLE_SELLER
                  constraints:
                    nullable: false

  # ============================================================
  # changeSet 3: FK pedidos -> users
  # RESTRICT: no se puede eliminar un usuario con pedidos.
  # onFail: MARK_RAN — si la FK ya existe, se registra sin error.
  # ============================================================
  - changeSet:
      id: 3-add-fk-pedidos-to-users
      author: pulpapp-team
      comment: Crea FK pedidos.user_id hacia users.id con RESTRICT.
      preConditions:
        onFail: MARK_RAN
        not:
          foreignKeyConstraintExists:
            foreignKeyName: fk_pedidos_user
      changes:
        - addForeignKeyConstraint:
            baseTableName: pedidos
            baseColumnNames: user_id
            constraintName: fk_pedidos_user
            referencedTableName: users
            referencedColumnNames: id
            onDelete: RESTRICT

  # ============================================================
  # changeSet 5: Tabla job_applications
  # Almacena postulaciones del formulario "Trabaja con nosotros".
  # cv_file guarda solo el nombre del archivo subido.
  # onFail: MARK_RAN — si la tabla ya existe, se registra sin error.
  # ============================================================
  - changeSet:
      id: 5-create-job-applications-table
      author: pulpapp-team
      comment: Crea la tabla job_applications para postulaciones laborales.
      preConditions:
        onFail: MARK_RAN
        not:
          tableExists:
            tableName: job_applications
      changes:
        - createTable:
            tableName: job_applications
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: full_name
                  type: VARCHAR(150)
                  constraints:
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(150)
                  constraints:
                    nullable: false
              - column:
                  name: phone
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: position
                  type: VARCHAR(150)
                  constraints:
                    nullable: true
              - column:
                  name: message
                  type: TEXT
                  constraints:
                    nullable: true
              - column:
                  name: cv_file
                  type: VARCHAR(255)
                  constraints:
                    nullable: true
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false

  # ============================================================
  # changeSet 6: Columna activo en users
  # Permite activar/desactivar vendedores sin eliminarlos.
  # DEFAULT true para compatibilidad con registros existentes.
  # onFail: MARK_RAN — si la columna ya existe, se registra sin error.
  # ============================================================
  - changeSet:
      id: 6-add-activo-to-users
      author: pulpapp-team
      comment: Agrega columna activo a users para gestionar estado del vendedor.
      preConditions:
        onFail: MARK_RAN
        not:
          columnExists:
            tableName: users
            columnName: activo
      changes:
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: activo
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false

  # ============================================================
  # changeSet 8: Tabla app_config
  # Almacena configuración dinámica del sistema (clave-valor).
  # Ejemplos: whatsapp_number, recruitment_enabled, delivery_mode.
  # onFail: MARK_RAN — idempotente.
  # ============================================================
  - changeSet:
      id: 8-create-app-config-table
      author: pulpapp-team
      comment: Crea la tabla app_config para configuración dinámica del sistema.
      preConditions:
        onFail: MARK_RAN
        not:
          tableExists:
            tableName: app_config
      changes:
        - createTable:
            tableName: app_config
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: config_key
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: config_value
                  type: TEXT
                  constraints:
                    nullable: true

  # ============================================================
  # changeSet 9: Tabla notifications
  # Almacena notificaciones creadas por el admin para mostrar
  # en el frontend (navbar/banner).
  # onFail: MARK_RAN — idempotente.
  # ============================================================
  - changeSet:
      id: 9-create-notifications-table
      author: pulpapp-team
      comment: Crea la tabla notifications para mensajes del administrador.
      preConditions:
        onFail: MARK_RAN
        not:
          tableExists:
            tableName: notifications
      changes:
        - createTable:
            tableName: notifications
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: title
                  type: VARCHAR(150)
                  constraints:
                    nullable: false
              - column:
                  name: message
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: active
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false

  # ============================================================
  # changeSet 7: Migrar usuarios ROLE_SELLER registrados públicamente
  # a ROLE_CLIENT. Los vendedores reales creados por el admin
  # conservan ROLE_SELLER. Solo se migran los que NO son ADMIN.
  # NOTA: Este changeset actualiza TODOS los ROLE_SELLER a ROLE_CLIENT.
  # Los vendedores deben ser re-asignados manualmente desde el panel.
  # onFail: MARK_RAN — idempotente.
  # ============================================================
  - changeSet:
      id: 7-migrate-seller-to-client
      author: pulpapp-team
      comment: Cambia ROLE_SELLER a ROLE_CLIENT para usuarios registrados públicamente.
      preConditions:
        onFail: MARK_RAN
        sqlCheck:
          expectedResult: "1"
          sql: SELECT CASE WHEN COUNT(*) > 0 THEN 1 ELSE 0 END FROM users WHERE role = 'ROLE_SELLER'
      changes:
        - sql:
            sql: UPDATE users SET role = 'ROLE_CLIENT' WHERE role = 'ROLE_SELLER'

  # ============================================================
  # FASE 1 MULTI-TENANT
  # ============================================================

  # ============================================================
  # changeSet 10: Tabla tenants
  # Almacena los inquilinos del sistema SaaS.
  # Cada tenant agrupa usuarios y, en fases posteriores,
  # productos, pedidos y configuraciones.
  # onFail: MARK_RAN — idempotente.
  # ============================================================
  - changeSet:
      id: 10-create-tenants-table
      author: pulpapp-team
      comment: "Fase 1 Multi-Tenant: crea la tabla tenants."
      preConditions:
        onFail: MARK_RAN
        not:
          tableExists:
            tableName: tenants
      changes:
        - createTable:
            tableName: tenants
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: status
                  type: VARCHAR(20)
                  defaultValue: ACTIVE
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false

  # ============================================================
  # changeSet 11: Tenant por defecto
  # Inserta el tenant "PulpApp" para que los usuarios existentes
  # y los nuevos registros tengan un tenant asignado.
  # onFail: MARK_RAN — idempotente.
  # ============================================================
  - changeSet:
      id: 11-seed-default-tenant
      author: pulpapp-team
      comment: "Fase 1 Multi-Tenant: inserta el tenant por defecto PulpApp."
      preConditions:
        onFail: MARK_RAN
        sqlCheck:
          expectedResult: "0"
          sql: SELECT COUNT(*) FROM tenants WHERE name = 'PulpApp'
      changes:
        - insert:
            tableName: tenants
            columns:
              - column:
                  name: name
                  value: PulpApp
              - column:
                  name: status
                  value: ACTIVE

  # ============================================================
  # changeSet 12: Columna tenant_id en users
  # Asocia cada usuario a un tenant. Nullable inicialmente
  # para no romper registros existentes.
  # onFail: MARK_RAN — idempotente.
  # ============================================================
  - changeSet:
      id: 12-add-tenant-id-to-users
      author: pulpapp-team
      comment: "Fase 1 Multi-Tenant: agrega columna tenant_id a users."
      preConditions:
        onFail: MARK_RAN
        not:
          columnExists:
            tableName: users
            columnName: tenant_id
      changes:
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: tenant_id
                  type: BIGINT
                  constraints:
                    nullable: true

  # ============================================================
  # changeSet 13: Migrar usuarios existentes al tenant por defecto
  # Asigna tenant_id = (id del tenant PulpApp) a todos los usuarios
  # que aún no tienen tenant asignado.
  # onFail: MARK_RAN — idempotente.
  # ============================================================
  - changeSet:
      id: 13-migrate-users-to-default-tenant
      author: pulpapp-team
      comment: "Fase 1 Multi-Tenant: asigna el tenant por defecto a usuarios existentes."
      preConditions:
        onFail: MARK_RAN
        sqlCheck:
          expectedResult: "1"
          sql: SELECT CASE WHEN COUNT(*) > 0 THEN 1 ELSE 0 END FROM users WHERE tenant_id IS NULL
      changes:
        - sql:
            sql: >
              UPDATE users
              SET tenant_id = (SELECT id FROM tenants WHERE name = 'PulpApp' LIMIT 1)
              WHERE tenant_id IS NULL

  # ============================================================
  # changeSet 14: FK users -> tenants
  # Crea la foreign key después de migrar los datos existentes.
  # onFail: MARK_RAN — idempotente.
  # ============================================================
  - changeSet:
      id: 14-add-fk-users-to-tenants
      author: pulpapp-team
      comment: "Fase 1 Multi-Tenant: crea FK users.tenant_id hacia tenants.id."
      preConditions:
        onFail: MARK_RAN
        not:
          foreignKeyConstraintExists:
            foreignKeyName: fk_users_tenant
      changes:
        - addForeignKeyConstraint:
            baseTableName: users
            baseColumnNames: tenant_id
            constraintName: fk_users_tenant
            referencedTableName: tenants
            referencedColumnNames: id
            onDelete: RESTRICT

  # ============================================================
  # changeSet 15: Índice en users.tenant_id
  # Optimiza consultas filtradas por tenant (preparación para
  # aislamiento de datos en fases posteriores).
  # onFail: MARK_RAN — idempotente.
  # ============================================================
  - changeSet:
      id: 15-index-users-tenant-id
      author: pulpapp-team
      comment: "Fase 1 Multi-Tenant: crea indice en users.tenant_id."
      preConditions:
        onFail: MARK_RAN
        not:
          indexExists:
            indexName: idx_users_tenant_id
      changes:
        - createIndex:
            tableName: users
            indexName: idx_users_tenant_id
            columns:
              - column:
                  name: tenant_id

  # ============================================================
  # FASE 4 — ONBOARDING SAAS
  # ============================================================

  # ============================================================
  # changeSet 16: Columna status en users
  # Estado del ciclo de vida SaaS del usuario.
  # DEFAULT ACTIVE para compatibilidad con usuarios existentes.
  # onFail: MARK_RAN — idempotente.
  # ============================================================
  - changeSet:
      id: 16-add-status-to-users
      author: pulpapp-team
      comment: "Fase 4 SaaS: agrega columna status a users."
      preConditions:
        onFail: MARK_RAN
        not:
          columnExists:
            tableName: users
            columnName: status
      changes:
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: status
                  type: VARCHAR(30)
                  defaultValue: ACTIVE
                  constraints:
                    nullable: false

  # ============================================================
  # changeSet 17: Tabla payments
  # Comprobantes de pago del onboarding SaaS.
  # onFail: MARK_RAN — idempotente.
  # ============================================================
  - changeSet:
      id: 17-create-payments-table
      author: pulpapp-team
      comment: "Fase 4 SaaS: crea la tabla payments para comprobantes de pago."
      preConditions:
        onFail: MARK_RAN
        not:
          tableExists:
            tableName: payments
      changes:
        - createTable:
            tableName: payments
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: amount
                  type: DECIMAL(10,2)
                  constraints:
                    nullable: false
              - column:
                  name: method
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: reference
                  type: VARCHAR(100)
                  constraints:
                    nullable: true
              - column:
                  name: proof_url
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(20)
                  defaultValue: PENDING
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
              - column:
                  name: approved_by
                  type: BIGINT
                  constraints:
                    nullable: true
              - column:
                  name: approved_at
                  type: TIMESTAMP
                  constraints:
                    nullable: true
              - column:
                  name: rejection_reason
                  type: TEXT
                  constraints:
                    nullable: true
              - column:
                  name: tenant_name
                  type: VARCHAR(100)
                  constraints:
                    nullable: true

  # ============================================================
  # changeSet 18: Tabla tenant_config
  # Configuración visual (branding) por tenant.
  # onFail: MARK_RAN — idempotente.
  # ============================================================
  - changeSet:
      id: 18-create-tenant-config-table
      author: pulpapp-team
      comment: "Fase 4 SaaS: crea la tabla tenant_config para branding por tenant."
      preConditions:
        onFail: MARK_RAN
        not:
          tableExists:
            tableName: tenant_config
      changes:
        - createTable:
            tableName: tenant_config
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: logo_url
                  type: TEXT
                  constraints:
                    nullable: true
              - column:
                  name: primary_color
                  type: VARCHAR(20)
                  constraints:
                    nullable: true
              - column:
                  name: secondary_color
                  type: VARCHAR(20)
                  constraints:
                    nullable: true
              - column:
                  name: banner_url
                  type: TEXT
                  constraints:
                    nullable: true

  # ============================================================
  # changeSet 19: Índice en payments.user_id
  # onFail: MARK_RAN — idempotente.
  # ============================================================
  - changeSet:
      id: 19-index-payments-user-id
      author: pulpapp-team
      comment: "Fase 4 SaaS: crea indice en payments.user_id."
      preConditions:
        onFail: MARK_RAN
        not:
          indexExists:
            indexName: idx_payments_user_id
      changes:
        - createIndex:
            tableName: payments
            indexName: idx_payments_user_id
            columns:
              - column:
                  name: user_id

  # ============================================================
  # changeSet 20: Índice en payments.status
  # onFail: MARK_RAN — idempotente.
  # ============================================================
  - changeSet:
      id: 20-index-payments-status
      author: pulpapp-team
      comment: "Fase 4 SaaS: crea indice en payments.status."
      preConditions:
        onFail: MARK_RAN
        not:
          indexExists:
            indexName: idx_payments_status
      changes:
        - createIndex:
            tableName: payments
            indexName: idx_payments_status
            columns:
              - column:
                  name: status

  # ============================================================
  # FASE 5 — RBAC MULTI-TENANT
  # ============================================================

  # ============================================================
  # changeSet 21: Tabla user_tenant_roles
  # Relación usuario-tenant-rol para RBAC multi-tenant.
  # Un usuario puede tener roles distintos en diferentes tenants.
  # onFail: MARK_RAN — idempotente.
  # ============================================================
  - changeSet:
      id: 21-create-user-tenant-roles-table
      author: pulpapp-team
      comment: "Fase 5 RBAC: crea la tabla user_tenant_roles."
      preConditions:
        onFail: MARK_RAN
        not:
          tableExists:
            tableName: user_tenant_roles
      changes:
        - createTable:
            tableName: user_tenant_roles
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: tenant_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: role
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: user_tenant_roles
            columnNames: user_id, tenant_id
            constraintName: uk_user_tenant

  # ============================================================
  # changeSet 22: Índice en user_tenant_roles.user_id
  # onFail: MARK_RAN — idempotente.
  # ============================================================
  - changeSet:
      id: 22-index-utr-user-id
      author: pulpapp-team
      comment: "Fase 5 RBAC: crea indice en user_tenant_roles.user_id."
      preConditions:
        onFail: MARK_RAN
        not:
          indexExists:
            indexName: idx_utr_user_id
      changes:
        - createIndex:
            tableName: user_tenant_roles
            indexName: idx_utr_user_id
            columns:
              - column:
                  name: user_id

  # ============================================================
  # changeSet 23: Índice en user_tenant_roles.tenant_id
  # onFail: MARK_RAN — idempotente.
  # ============================================================
  - changeSet:
      id: 23-index-utr-tenant-id
      author: pulpapp-team
      comment: "Fase 5 RBAC: crea indice en user_tenant_roles.tenant_id."
      preConditions:
        onFail: MARK_RAN
        not:
          indexExists:
            indexName: idx_utr_tenant_id
      changes:
        - createIndex:
            tableName: user_tenant_roles
            indexName: idx_utr_tenant_id
            columns:
              - column:
                  name: tenant_id

  # ============================================================
  # changeSet 24: Migrar usuarios existentes a user_tenant_roles
  # Para cada usuario con tenant_id NOT NULL, crea un registro
  # en user_tenant_roles con el rol derivado del campo legacy.
  # ROLE_ADMIN → ADMIN, ROLE_SELLER → SELLER, ROLE_CLIENT → CLIENT
  # onFail: MARK_RAN — idempotente.
  # ============================================================
  - changeSet:
      id: 24-migrate-existing-users-to-utr
      author: pulpapp-team
      comment: "Fase 5 RBAC: migra usuarios existentes a user_tenant_roles."
      preConditions:
        onFail: MARK_RAN
        sqlCheck:
          expectedResult: "1"
          sql: >
            SELECT CASE WHEN COUNT(*) > 0 THEN 1 ELSE 0 END
            FROM users u
            WHERE u.tenant_id IS NOT NULL
            AND NOT EXISTS (SELECT 1 FROM user_tenant_roles utr WHERE utr.user_id = u.id AND utr.tenant_id = u.tenant_id)
      changes:
        - sql:
            sql: >
              INSERT INTO user_tenant_roles (user_id, tenant_id, role, created_at)
              SELECT u.id, u.tenant_id,
                CASE
                  WHEN u.role = 'ROLE_ADMIN' THEN 'ADMIN'
                  WHEN u.role = 'ROLE_SELLER' THEN 'SELLER'
                  ELSE 'CLIENT'
                END,
                NOW()
              FROM users u
              WHERE u.tenant_id IS NOT NULL
              AND NOT EXISTS (SELECT 1 FROM user_tenant_roles utr WHERE utr.user_id = u.id AND utr.tenant_id = u.tenant_id)

  # ============================================================
  # REBRANDING — PulpApp → Zentrix
  # ============================================================

  # ============================================================
  # changeSet 25: Renombrar tenant por defecto
  # Actualiza el nombre del tenant de "PulpApp" a "Zentrix".
  # Idempotente: solo ejecuta si existe un tenant con nombre "PulpApp".
  # ============================================================
  - changeSet:
      id: 25-rebrand-default-tenant
      author: pulpapp-team
      comment: "Rebranding: renombra tenant PulpApp a Zentrix."
      preConditions:
        onFail: MARK_RAN
        sqlCheck:
          expectedResult: "1"
          sql: SELECT CASE WHEN COUNT(*) > 0 THEN 1 ELSE 0 END FROM tenants WHERE name = 'PulpApp'
      changes:
        - sql:
