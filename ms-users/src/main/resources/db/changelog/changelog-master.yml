databaseChangeLog:

  # ============================================================
  # changeSet 1: Tabla users
  # Almacena los clientes registrados en PulpApp.
  # cedula y email son unicos. telefono es nullable por
  # compatibilidad con registros historicos.
  # onFail: MARK_RAN — si la tabla ya existe, se registra sin error.
  # ============================================================
  - changeSet:
      id: 1-create-users-table
      author: pulpapp-team
      comment: Crea la tabla users con cedula y email unicos.
      preConditions:
        onFail: MARK_RAN
        not:
          tableExists:
            tableName: users
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: cedula
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
                    unique: true
              # Nullable por compatibilidad con datos historicos
              - column:
                  name: telefono
                  type: VARCHAR(20)
                  constraints:
                    nullable: true
              - column:
                  name: name
                  type: VARCHAR(150)
                  constraints:
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(150)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: password
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: direccion
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

  # ============================================================
  # changeSet 2: Tabla pedidos
  # Pedidos internos gestionados desde ms-users.
  # Relacion: Pedido (N) -> User (1) mediante FK user_id.
  # onFail: MARK_RAN — si la tabla ya existe, se registra sin error.
  # ============================================================
  - changeSet:
      id: 2-create-pedidos-table
      author: pulpapp-team
      comment: Crea la tabla pedidos con FK hacia users. Relacion N-1.
      preConditions:
        onFail: MARK_RAN
        not:
          tableExists:
            tableName: pedidos
      changes:
        - createTable:
            tableName: pedidos
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: descripcion
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: total
                  type: DOUBLE PRECISION
                  constraints:
                    nullable: false
              # FK hacia users: cada pedido pertenece a un usuario
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false

  # ============================================================
  # changeSet 3: FK pedidos -> users
  # RESTRICT: no se puede eliminar un usuario con pedidos.
  # onFail: MARK_RAN — si la FK ya existe, se registra sin error.
  # ============================================================
  - changeSet:
      id: 3-add-fk-pedidos-to-users
      author: pulpapp-team
      comment: Crea FK pedidos.user_id hacia users.id con RESTRICT.
      preConditions:
        onFail: MARK_RAN
        not:
          foreignKeyConstraintExists:
            foreignKeyName: fk_pedidos_user
      changes:
        - addForeignKeyConstraint:
            baseTableName: pedidos
            baseColumnNames: user_id
            constraintName: fk_pedidos_user
            referencedTableName: users
            referencedColumnNames: id
            onDelete: RESTRICT
