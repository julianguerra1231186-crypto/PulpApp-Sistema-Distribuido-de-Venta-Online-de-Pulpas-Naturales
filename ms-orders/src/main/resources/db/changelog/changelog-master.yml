databaseChangeLog:

  # ============================================================
  # changeSet 1: Tabla orders
  # Encabezado del pedido.
  # Hibernate convierte userId -> user_id (snake_case).
  # user_id es referencia logica a ms-users (sin FK fisica cross-service).
  # onFail: MARK_RAN — si la tabla ya existe, se registra sin error.
  # ============================================================
  - changeSet:
      id: 1-create-orders-table
      author: pulpapp-team
      comment: Crea la tabla orders. Cabecera del pedido con referencia logica al usuario.
      preConditions:
        onFail: MARK_RAN
        not:
          tableExists:
            tableName: orders
      changes:
        - createTable:
            tableName: orders
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              # Hibernate convierte userId -> user_id
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: total
                  type: DOUBLE PRECISION
                  constraints:
                    nullable: false
              - column:
                  name: fecha
                  type: TIMESTAMP
                  constraints:
                    nullable: false

  # ============================================================
  # changeSet 2: Tabla order_items
  # Detalle del pedido con precio historico.
  # Hibernate convierte: productId -> product_id,
  #                      precioUnitario -> precio_unitario
  # onFail: MARK_RAN — si la tabla ya existe, se registra sin error.
  # ============================================================
  - changeSet:
      id: 2-create-order-items-table
      author: pulpapp-team
      comment: Crea la tabla order_items. Detalle de cada pedido con FK hacia orders.
      preConditions:
        onFail: MARK_RAN
        not:
          tableExists:
            tableName: order_items
      changes:
        - createTable:
            tableName: order_items
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              # FK fisica hacia orders (mismo microservicio)
              - column:
                  name: order_id
                  type: BIGINT
                  constraints:
                    nullable: false
              # Hibernate convierte productId -> product_id
              - column:
                  name: product_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: cantidad
                  type: INTEGER
                  constraints:
                    nullable: false
              # Hibernate convierte precioUnitario -> precio_unitario
              - column:
                  name: precio_unitario
                  type: DOUBLE PRECISION
                  constraints:
                    nullable: false
              - column:
                  name: subtotal
                  type: DOUBLE PRECISION
                  constraints:
                    nullable: false

  # ============================================================
  # changeSet 3: FK order_items -> orders
  # CASCADE DELETE: al borrar un pedido se borran sus items.
  # onFail: MARK_RAN — si la FK ya existe, se registra sin error.
  # ============================================================
  - changeSet:
      id: 3-add-fk-order-items-to-orders
      author: pulpapp-team
      comment: Crea FK order_items.order_id hacia orders.id con CASCADE DELETE.
      preConditions:
        onFail: MARK_RAN
        not:
          foreignKeyConstraintExists:
            foreignKeyName: fk_order_items_order
      changes:
        - addForeignKeyConstraint:
            baseTableName: order_items
            baseColumnNames: order_id
            constraintName: fk_order_items_order
            referencedTableName: orders
            referencedColumnNames: id
            onDelete: CASCADE

  # ============================================================
  # changeSet 5: Campos de pago por transferencia en orders
  # unique_amount: total + centavos aleatorios para identificar el pago
  # payment_status: PENDING_PAYMENT | PENDING_APPROVAL | APPROVED | REJECTED
  # approved_by: email del admin que aprobó
  # paid_at: timestamp cuando el cliente marcó "Ya pagué"
  # approved_at: timestamp cuando el admin aprobó
  # onFail: MARK_RAN — idempotente
  # ============================================================
  - changeSet:
      id: 5-add-payment-fields-to-orders
      author: pulpapp-team
      comment: Agrega campos de pago por transferencia a la tabla orders.
      preConditions:
        onFail: MARK_RAN
        not:
          columnExists:
            tableName: orders
            columnName: payment_status
      changes:
        - addColumn:
            tableName: orders
            columns:
              - column:
                  name: unique_amount
                  type: DOUBLE PRECISION
                  constraints:
                    nullable: true
              - column:
                  name: payment_status
                  type: VARCHAR(30)
                  defaultValue: PENDING_PAYMENT
                  constraints:
                    nullable: false
              - column:
                  name: approved_by
                  type: VARCHAR(150)
                  constraints:
                    nullable: true
              - column:
                  name: paid_at
                  type: TIMESTAMP
                  constraints:
                    nullable: true
              - column:
                  name: approved_at
                  type: TIMESTAMP
                  constraints:
                    nullable: true

  # ============================================================
  # changeSet 6: Campo rejection_reason en orders
  # Motivo de rechazo del pago, visible para el cliente.
  # onFail: MARK_RAN — idempotente.
  # ============================================================
  - changeSet:
      id: 6-add-rejection-reason-to-orders
      author: pulpapp-team
      comment: Agrega campo rejection_reason a orders para que el admin explique el rechazo.
      preConditions:
        onFail: MARK_RAN
        not:
          columnExists:
            tableName: orders
            columnName: rejection_reason
      changes:
        - addColumn:
            tableName: orders
            columns:
              - column:
                  name: rejection_reason
                  type: TEXT
                  constraints:
                    nullable: true
  # Optimiza consultas de detalle de pedido.
  # onFail: MARK_RAN — si el indice ya existe, se registra sin error.
  # ============================================================
  - changeSet:
      id: 4-index-order-items-order-id
      author: pulpapp-team
      comment: Crea indice en order_items.order_id para optimizar consultas.
      preConditions:
        onFail: MARK_RAN
        not:
          indexExists:
            indexName: idx_order_items_order_id
      changes:
        - createIndex:
            tableName: order_items
            indexName: idx_order_items_order_id
            columns:
              - column:
                  name: order_id

  # ============================================================
  # FASE 3 MULTI-TENANT
  # ============================================================

  # ============================================================
  # changeSet 7: Columna tenant_id en orders
  # Asocia cada pedido a un tenant.
  # onFail: MARK_RAN — idempotente.
  # ============================================================
  - changeSet:
      id: 7-add-tenant-id-to-orders
      author: pulpapp-team
      comment: "Fase 3 Multi-Tenant: agrega columna tenant_id a orders."
      preConditions:
        onFail: MARK_RAN
        not:
          columnExists:
            tableName: orders
            columnName: tenant_id
      changes:
        - addColumn:
            tableName: orders
            columns:
              - column:
                  name: tenant_id
                  type: BIGINT
                  constraints:
                    nullable: true

  # ============================================================
  # changeSet 8: Columna tenant_id en order_items
  # onFail: MARK_RAN — idempotente.
  # ============================================================
  - changeSet:
      id: 8-add-tenant-id-to-order-items
      author: pulpapp-team
      comment: "Fase 3 Multi-Tenant: agrega columna tenant_id a order_items."
      preConditions:
        onFail: MARK_RAN
        not:
          columnExists:
            tableName: order_items
            columnName: tenant_id
      changes:
        - addColumn:
            tableName: order_items
            columns:
              - column:
                  name: tenant_id
                  type: BIGINT
                  constraints:
                    nullable: true

  # ============================================================
  # changeSet 9: Migrar pedidos existentes al tenant por defecto
  # onFail: MARK_RAN — idempotente.
  # ============================================================
  - changeSet:
      id: 9-migrate-orders-to-default-tenant
      author: pulpapp-team
      comment: "Fase 3 Multi-Tenant: asigna el tenant por defecto a pedidos existentes."
      preConditions:
        onFail: MARK_RAN
        sqlCheck:
          expectedResult: "1"
          sql: SELECT CASE WHEN COUNT(*) > 0 THEN 1 ELSE 0 END FROM orders WHERE tenant_id IS NULL
      changes:
        - sql:
            sql: >
              UPDATE orders
              SET tenant_id = (SELECT id FROM tenants WHERE name = 'PulpApp' LIMIT 1)
              WHERE tenant_id IS NULL

  # ============================================================
  # changeSet 10: Migrar items existentes al tenant por defecto
  # onFail: MARK_RAN — idempotente.
  # ============================================================
  - changeSet:
      id: 10-migrate-order-items-to-default-tenant
      author: pulpapp-team
      comment: "Fase 3 Multi-Tenant: asigna el tenant por defecto a order_items existentes."
      preConditions:
        onFail: MARK_RAN
        sqlCheck:
          expectedResult: "1"
          sql: SELECT CASE WHEN COUNT(*) > 0 THEN 1 ELSE 0 END FROM order_items WHERE tenant_id IS NULL
      changes:
        - sql:
            sql: >
              UPDATE order_items
              SET tenant_id = (SELECT id FROM tenants WHERE name = 'PulpApp' LIMIT 1)
              WHERE tenant_id IS NULL

  # ============================================================
  # changeSet 11: Índice en orders.tenant_id
  # onFail: MARK_RAN — idempotente.
  # ============================================================
  - changeSet:
      id: 11-index-orders-tenant-id
      author: pulpapp-team
      comment: "Fase 3 Multi-Tenant: crea indice en orders.tenant_id."
      preConditions:
        onFail: MARK_RAN
        not:
          indexExists:
            indexName: idx_orders_tenant_id
      changes:
        - createIndex:
            tableName: orders
            indexName: idx_orders_tenant_id
            columns:
              - column:
                  name: tenant_id

  # ============================================================
  # changeSet 12: Índice en order_items.tenant_id
  # onFail: MARK_RAN — idempotente.
  # ============================================================
  - changeSet:
      id: 12-index-order-items-tenant-id
      author: pulpapp-team
      comment: "Fase 3 Multi-Tenant: crea indice en order_items.tenant_id."
      preConditions:
        onFail: MARK_RAN
        not:
          indexExists:
            indexName: idx_order_items_tenant_id
      changes:
        - createIndex:
            tableName: order_items
            indexName: idx_order_items_tenant_id
            columns:
              - column:
                  name: tenant_id
