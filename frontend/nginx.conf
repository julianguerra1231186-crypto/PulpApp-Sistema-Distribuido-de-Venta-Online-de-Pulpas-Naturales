server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # HTML y JS nunca se cachean — garantiza que el navegador siempre
    # tome la versión más reciente tras un redeploy con docker-compose up --build
    location ~* \.(html|js)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri $uri/ /index.html;
    }

    # Archivos estáticos (CSS, imágenes, fuentes) — caché de 1 día
    location ~* \.(css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf)$ {
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    # Ruta principal
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy hacia el API Gateway para evitar CORS desde el navegador
    location /api/ {
        proxy_pass http://api-gateway:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
