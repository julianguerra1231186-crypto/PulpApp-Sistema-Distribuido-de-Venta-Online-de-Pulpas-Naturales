<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>PulpApp</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<!-- SPLASH -->

<div id="splash">
    <img src="img/sinfondologo-removebg-preview.png" class="logo-splash">
</div>


<div id="app" class="hidden">

    <header class="navbar">

        <h1>Catálogo</h1>

        <a href="landing.html" class="btn-volver">
            ← Volver al inicio
        </a>

    </header>


    <div class="carrito-flotante" onclick="abrirCarrito()">
        🛒
        <span id="contador">0</span>
    </div>


    <div class="busqueda-container">

        <input
                type="text"
                id="buscador"
                placeholder="🔎 Buscar pulpas..."
                onkeyup="buscarProducto()">

    </div>


    <section class="catalogo">

        <div class="producto">

            <img src="img/fresa.png" class="producto-img" onclick="verImagen(this.src)">

            <h3>🍓 Pulpa de Fresa</h3>

            <p class="precio">$6000</p>

            <button onclick="agregarCarrito('Pulpa de Fresa',6000)">
                Agregar
            </button>

        </div>


        <div class="producto">

            <img src="img/mora.png" class="producto-img" onclick="verImagen(this.src)">

            <h3>🍒 Pulpa de Mora</h3>

            <p class="precio">$6500</p>

            <button onclick="agregarCarrito('Pulpa de Mora',6500)">
                Agregar
            </button>

        </div>


        <div class="producto">

            <img src="img/maracuya.png" class="producto-img" onclick="verImagen(this.src)">

            <h3>🍊 Pulpa de Maracuyá</h3>

            <p class="precio">$7000</p>

            <button onclick="agregarCarrito('Pulpa de Maracuyá',7000)">
                Agregar
            </button>

        </div>


        <div class="producto">

            <img src="img/lulo.png" class="producto-img" onclick="verImagen(this.src)">

            <h3>🍋 Pulpa de Lulo</h3>

            <p class="precio">$6500</p>

            <button onclick="agregarCarrito('Pulpa de Lulo',6500)">
                Agregar
            </button>

        </div>


        <div class="producto">

            <img src="img/coco.png" class="producto-img" onclick="verImagen(this.src)">

            <h3>🥥 Pulpa de Coco</h3>

            <p class="precio">$7500</p>

            <button onclick="agregarCarrito('Pulpa de Coco',7500)">
                Agregar
            </button>

        </div>


        <div class="producto">

            <img src="img/durazno.png" class="producto-img" onclick="verImagen(this.src)">

            <h3>🍑 Pulpa de Durazno</h3>

            <p class="precio">$6500</p>

            <button onclick="agregarCarrito('Pulpa de Durazno',6500)">
                Agregar
            </button>

        </div>

    </section>



    <!-- PANEL CARRITO -->

    <div id="panelCarrito" class="panel-carrito hidden">

        <button class="cerrar-carrito" onclick="cerrarCarrito()">✖</button>

        <h2>Tu carrito</h2>

        <ul id="listaCarrito"></ul>

        <h3>Total: $<span id="total">0</span></h3>


        <!-- DATOS CLIENTE -->

        <h3>Datos del cliente</h3>

        <label>Cédula</label>
        <input type="text" id="cedula">

        <button onclick="buscarUsuario()">Consultar</button>

        <label>Nombre completo</label>
        <input type="text" id="nombre">

        <label>Correo</label>
        <input type="email" id="correo">

        <label>Dirección</label>
        <input type="text" id="direccion">

        <div style="margin-top:10px">

            <button onclick="crearUsuario()" class="btn-guardar">
                Agregar usuario
            </button>

            <button onclick="modificarUsuario()" class="btn-editar">
                Modificar usuario
            </button>

        </div>


        <button class="btn-comprar" onclick="enviarPedido()">
            Confirmar pedido por WhatsApp
        </button>

    </div>



    <div id="modalImagen" class="modal hidden" onclick="cerrarImagen()">

        <img id="imagenGrande">

    </div>

</div>


<div id="notificacion"></div>

<script src="app.js"></script>

</body>
</html>
