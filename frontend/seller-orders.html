<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PulpApp | Pedidos Clientes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <style>
        /* ── Estilos específicos de la vista de pedidos del vendedor ── */

        .seller-orders-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 24px;
        }

        .seller-orders-header h1 {
            font-family: var(--font-display);
            font-size: clamp(1.5rem, 3vw, 2rem);
            margin: 0;
        }

        /* Tabla de pedidos */
        .orders-table-wrap {
            overflow-x: auto;
            border-radius: var(--radius-lg, 16px);
        }

        .orders-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.92rem;
        }

        .orders-table thead {
            background: linear-gradient(135deg, var(--brand-mid, #1a7a4a), var(--brand-dark, #0d7a4d));
            color: #fff;
        }

        .orders-table th {
            padding: 14px 16px;
            text-align: left;
            font-weight: 600;
            white-space: nowrap;
        }

        .orders-table tbody tr {
            border-bottom: 1px solid var(--line, rgba(0,0,0,0.07));
            transition: background 0.15s;
        }

        .orders-table tbody tr:hover {
            background: var(--brand-soft, #f0faf5);
        }

        .orders-table td {
            padding: 14px 16px;
            vertical-align: top;
        }

        /* Lista de productos dentro de la celda */
        .product-list {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .product-list li {
            font-size: 0.85rem;
            color: var(--text-muted, #555);
        }

        .product-list li strong {
            color: var(--text, #1a1a1a);
        }

        /* Total destacado */
        .order-total-cell {
            font-weight: 700;
            color: var(--brand-dark, #0d7a4d);
            white-space: nowrap;
        }

        /* Fecha y hora */
        .order-date-cell {
            white-space: nowrap;
            font-size: 0.88rem;
        }

        .order-date-cell .order-time {
            display: block;
            color: var(--text-muted, #777);
            font-size: 0.8rem;
            margin-top: 2px;
        }

        /* Estado vacío */
        .empty-state-row td {
            text-align: center;
            padding: 48px 16px;
            color: var(--text-muted, #777);
        }

        /* Contador de pedidos */
        .orders-count-badge {
            background: var(--brand-soft, #e8f5e9);
            color: var(--brand-dark, #0d7a4d);
            border: 1px solid rgba(13,122,77,0.2);
            border-radius: var(--radius-pill, 999px);
            padding: 6px 16px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        /* Skeleton loader */
        .skeleton-row td {
            padding: 14px 16px;
        }

        .skeleton-cell {
            height: 16px;
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.4s infinite;
            border-radius: 6px;
        }

        @keyframes shimmer {
            0%   { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Responsive: ocultar columnas menos críticas en móvil */
        @media (max-width: 640px) {
            .orders-table .col-email,
            .orders-table .col-hora {
                display: none;
            }
        }
    </style>
</head>
<body data-page="seller-orders">

<!-- ═══════════════════════════════════════════════════════════ NAVBAR -->
<header class="site-header">
    <div class="header-inner">

            <div><span class="brand-kicker">PulpApp</span></div>
        </div>
        <nav class="site-nav" aria-label="Principal">

            <a href="catalog.html">Catálogo</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="seller-orders.html" class="is-active" data-nav="account">Pedidos Clientes</a>
        </nav>
        <a href="cart.html" class="cart-chip">
            <span>Carrito</span>
            <strong id="navCartCount">0</strong>
        </a>

</header>

<main class="page-content">

    <!-- ── Banner ── -->
    <section class="page-banner glass-card dashboard-banner">
        <div>
            <span class="eyebrow" id="roleBadge">Vendedor</span>
            <h1>Pedidos Clientes</h1>
            <p style="color:var(--text-muted); margin:0">
                Visualiza todos los pedidos realizados por los clientes.
            </p>
        </div>
        <button id="logoutBtn" class="btn btn-danger" type="button">Cerrar sesión</button>
    </section>

    <!-- ── Panel principal ── -->
    <section class="dash-panel glass-card">

        <div class="seller-orders-header">
            <div>
                <span class="eyebrow">Historial completo</span>
                <h2 style="margin:4px 0 0; font-family:var(--font-display); font-size:1.4rem">
                    Pedidos Clientes

            </div>
            <span id="ordersCountBadge" class="orders-count-badge">Cargando...</span>
        </div>

        <!-- Tabla de pedidos -->
        <div class="orders-table-wrap">
            <table class="orders-table" id="ordersTable" aria-label="Tabla de pedidos de clientes">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Cliente</th>
                        <th class="col-email">Email</th>
                        <th>Productos</th>
                        <th>Fecha</th>
                        <th class="col-hora">Hora</th>
                        <th>Total</th>
                    </tr>
                </thead>
                <tbody id="ordersTableBody">
                    <!-- Skeleton loader inicial -->
                    <tr class="skeleton-row">
                        <td><div class="skeleton-cell" style="width:30px"></div></td>
                        <td><div class="skeleton-cell" style="width:120px"></div></td>
                        <td class="col-email"><div class="skeleton-cell" style="width:160px"></div></td>
                        <td><div class="skeleton-cell" style="width:200px"></div></td>
                        <td><div class="skeleton-cell" style="width:80px"></div></td>
                        <td class="col-hora"><div class="skeleton-cell" style="width:60px"></div></td>
                        <td><div class="skeleton-cell" style="width:80px"></div></td>
                    </tr>
                </tbody>
            </table>
        </div>

    </section>

</main>

<script src="auth.js"></script>
<script src="whatsapp.js"></script>
<script>
(function () {
    "use strict";

    const BASE = "http://localhost:8090";

    // ─────────────────────────────────────────────────────────────
    // Utilidades
    // ─────────────────────────────────────────────────────────────

    /**
     * Muestra un mensaje toast temporal.
     * @param {string} msg  - Texto del mensaje
     * @param {string} type - "error" para estilo de error, cualquier otro para éxito
     */
    function toast(msg, type) {
        const el = document.getElementById("appToast");
        if (!el) return;
        el.textContent = msg;
        el.className = "toast show" + (type === "error" ? " error" : "");
        clearTimeout(window.__toastTimer);
        window.__toastTimer = setTimeout(() => { el.className = "toast"; }, 3200);
    }

    /**
     * Construye los headers de autenticación con el JWT del localStorage.
     */
    function authHeaders() {
        const token = window.PulpAuth?.getToken();
        return {
            "Content-Type": "application/json",
            "Authorization": token ? `Bearer ${token}` : ""
        };
    }

    /**
     * Formatea un número como moneda colombiana.
     * @param {number} value
     * @returns {string} ej: "$ 12.500"
     */
    function formatCurrency(value) {
        return "$ " + new Intl.NumberFormat("es-CO").format(Number(value || 0));
    }

    /**
     * Formatea una fecha ISO a formato legible en español colombiano.
     * @param {string} isoDate
     * @returns {{ date: string, time: string }}
     */
    function formatDateTime(isoDate) {
        if (!isoDate) return { date: "—", time: "—" };
        const d = new Date(isoDate);
        return {
            date: d.toLocaleDateString("es-CO", { day: "2-digit", month: "2-digit", year: "numeric" }),
            time: d.toLocaleTimeString("es-CO", { hour: "2-digit", minute: "2-digit" })
        };
    }

    // ─────────────────────────────────────────────────────────────
    // Carga y renderizado de pedidos
    // ─────────────────────────────────────────────────────────────

    /**
     * Consulta GET /orders/seller y renderiza la tabla.
     * Maneja errores de red, token expirado y respuesta vacía.
     */
    async function loadSellerOrders() {
        const tbody      = document.getElementById("ordersTableBody");
        const countBadge = document.getElementById("ordersCountBadge");

        try {
            const response = await fetch(`${BASE}/orders/seller`, {
                method: "GET",
                headers: authHeaders()
            });

            // Token inválido o sin permisos → redirigir al login
            if (response.status === 401 || response.status === 403) {
                toast("Sesión expirada o sin permisos. Redirigiendo...", "error");
                setTimeout(() => { window.location.href = "login.html"; }, 1800);
                return;
            }

            if (!response.ok) {
                throw new Error(`Error del servidor: ${response.status}`);
            }

            const orders = await response.json();

            // Actualizar contador
            countBadge.textContent = `${orders.length} pedido${orders.length !== 1 ? "s" : ""}`;

            renderOrdersTable(orders, tbody);

        } catch (err) {
            // Error de red o servidor
            tbody.innerHTML = `
                <tr class="empty-state-row">
                    <td colspan="7">
                        <p style="color:var(--danger, #c0392b); font-weight:600">
                            ❌ No se pudieron cargar los pedidos
                        </p>
                        <p style="font-size:0.85rem; margin-top:4px">${err.message}</p>
                    </td>
                </tr>
            `;
            countBadge.textContent = "Error al cargar";
            toast(err.message, "error");
        }
    }

    /**
     * Renderiza las filas de la tabla con los datos de los pedidos.
     * @param {Array}       orders - Lista de SellerOrderDTO del backend
     * @param {HTMLElement} tbody  - Elemento tbody de la tabla
     */
    function renderOrdersTable(orders, tbody) {
        if (!orders.length) {
            tbody.innerHTML = `
                <tr class="empty-state-row">
                    <td colspan="7">
                        <p>📭 No hay pedidos registrados aún.</p>
                    </td>
                </tr>
            `;
            return;
        }

        tbody.innerHTML = orders.map(order => {
            const { date, time } = formatDateTime(order.fecha);

            // Construir lista de productos del pedido
            const productsList = (order.items || []).map(item =>
                `<li><strong>${escapeHtml(item.productName || "Producto #" + item.productId)}</strong>
                 × ${item.cantidad}</li>`
            ).join("");

            return `
                <tr>
                    <td><strong>#${order.id}</strong></td>
                    <td>
                        <strong>${escapeHtml(order.clientName || "—")}</strong>
                    </td>
                    <td class="col-email" style="color:var(--text-muted); font-size:0.87rem">
                        ${escapeHtml(order.clientEmail || "—")}
                    </td>
                    <td>
                        <ul class="product-list">${productsList || "<li>Sin productos</li>"}</ul>
                    </td>
                    <td class="order-date-cell">
                        ${date}
                    </td>
                    <td class="col-hora order-date-cell">
                        <span class="order-time">${time}</span>
                    </td>
                    <td class="order-total-cell">
                        ${formatCurrency(order.total)}
                    </td>
                </tr>
            `;
        }).join("");
    }

    /**
     * Escapa caracteres HTML para prevenir XSS al renderizar datos del servidor.
     * @param {string} str
     * @returns {string}
     */
    function escapeHtml(str) {
        const div = document.createElement("div");
        div.appendChild(document.createTextNode(String(str || "")));
        return div.innerHTML;
    }

    // ─────────────────────────────────────────────────────────────
    // Inicialización
    // ─────────────────────────────────────────────────────────────

    document.addEventListener("DOMContentLoaded", () => {

        // Guard: sin sesión válida → redirigir al login
        if (!window.PulpAuth?.isTokenValid()) {
            window.location.href = "login.html";
            return;
        }

        const user = window.PulpAuth.getSessionUser();
        const role = user?.role || "";

        // Guard: solo SELLER y ADMIN pueden acceder a esta vista
        if (role !== "ROLE_SELLER" && role !== "ROLE_ADMIN") {
            toast("No tienes permisos para ver esta sección.", "error");
            setTimeout(() => { window.location.href = "dashboard.html"; }, 1800);
            return;
        }

        // Actualizar badge de rol en el banner
        const roleBadge = document.getElementById("roleBadge");
        if (roleBadge) {
            roleBadge.textContent = role === "ROLE_ADMIN" ? "⚙️ Administrador" : "🏷️ Vendedor";
        }

        // Contador del carrito en navbar
        const navCount = document.getElementById("navCartCount");
        if (navCount) {
            try {
                const cart = JSON.parse(localStorage.getItem("pulpapp_cart") || "[]");
                const total = cart.reduce((s, i) => s + (i.cantidad || 0), 0);
                navCount.textContent = String(total);
            } catch {
                navCount.textContent = "0";
            }
        }

        // Logout
        document.getElementById("logoutBtn")?.addEventListener("click", () => {
            window.PulpAuth.logout();
        });

        // Cargar pedidos
        loadSellerOrders();
    });

})();
</script>
</body>
</html>
